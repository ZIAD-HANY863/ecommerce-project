<style>
  
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f9fafb;
    --text-primary: #111827;
    --text-secondary: #4b5563;
    --border-color: #e5e7eb;
    --card-bg: #ffffff;
    --footer-bg: #f3f4f6;
    --navbar-bg: rgba(255, 255, 255, 0.85);
    --navbar-border: rgba(0, 0, 0, 0.1);
    --neon-color: #3b82f6;
    --btn-primary: #3b82f6;
    --btn-primary-hover: #2563eb;
  }

  html.dark {
    --bg-primary: #111827;
    --bg-secondary: #1f2937;
    --text-primary: #f9fafb;
    --text-secondary: #9ca3af;
    --border-color: #374151;
    --card-bg: #1f2937;
    --footer-bg: #111827;
    --navbar-bg: rgba(17, 24, 39, 0.9);
    --navbar-border: rgba(59, 130, 246, 0.3);
    --neon-color: #60a5fa;
    --btn-primary: #3b82f6;
    --btn-primary-hover: #60a5fa;
  }

  
  .navbar {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    z-index: 1000;
  }

  .navbar-container {
    background: var(--navbar-bg);
    backdrop-filter: blur(12px);
    border-radius: 60px;
    padding: 0.8rem 1.8rem;
    border: 1px solid var(--navbar-border);
    box-shadow: 0 0 8px var(--neon-color), 0 0 15px rgba(0,0,0,0.1);
    transition: box-shadow 0.3s;
    position: relative;
  }

  .navbar-container:hover {
    box-shadow: 0 0 15px var(--neon-color), 0 0 25px var(--neon-color);
  }

  .navbar-links {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    direction: ltr;
  }

  html[dir="ltr"] .logo-center {
    order: 1;
  }
  html[dir="ltr"] .nav-left {
    order: 0;
  }
  html[dir="ltr"] .nav-right {
    order: 2;
  }
  html[dir="rtl"] .logo-center {
    order: 1;
  }
  html[dir="rtl"] .nav-left {
    order: 0;
  }
  html[dir="rtl"] .nav-right {
    order: 2;
  }

  .nav-left, .nav-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex: 1;
  }

  html[dir="ltr"] .nav-left {
    justify-content: flex-start;
  }
  html[dir="ltr"] .nav-right {
    justify-content: flex-end;
  }
  html[dir="rtl"] .nav-left {
    justify-content: flex-start;
  }
  html[dir="rtl"] .nav-right {
    justify-content: flex-end;
  }

  .logo-center {
    flex: 0;
    display: flex;
    align-items: center;
  }

  .logo-img {
    height: 45px;
    width: auto;
    display: block;
  }

  
  .navbar-links a {
    color: var(--text-primary);
    text-decoration: none;
    font-weight: 500;
    font-size: 1rem;
    transition: color 0.2s;
    position: relative;
    padding-bottom: 4px;
  }

  
  .navbar-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--btn-primary);
    transition: width 0.3s ease;
  }

  .navbar-links a:hover::after {
    width: 100%;
  }

  .navbar-links a:hover {
    color: var(--btn-primary);
  }

  
  .cart-wrapper {
    position: relative;
    display: inline-block;
  }

  .cart-icon {
    font-size: 1.5rem;
    text-decoration: none;
    color: var(--text-primary);
    transition: color 0.2s;
  }

  .cart-icon:hover {
    color: var(--btn-primary);
  }

  .cart-badge {
    position: absolute;
    top: -8px;
    right: -12px;
    background: var(--btn-primary);
    color: white;
    font-size: 0.7rem;
    font-weight: bold;
    min-width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    box-shadow: 0 0 4px rgba(0,0,0,0.2);
  }

  
  #lang-toggle,
  #lang-toggle-mobile {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border: 1px solid rgba(255, 255, 255, 0.24);
    color: white;
    padding: 0.75rem 1.1rem;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.01em;
    box-shadow: 0 16px 35px rgba(59, 130, 246, 0.18);
    transition: transform 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
  }

  #lang-toggle:hover,
  #lang-toggle-mobile:hover {
    transform: translateY(-1px);
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    box-shadow: 0 18px 38px rgba(59, 130, 246, 0.24);
  }

  
  #dark-mode-toggle {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--text-primary);
    padding: 0;
    margin-left: 0.5rem;
  }

  
  .mobile-menu-toggle,
  .mobile-menu {
    display: none;
  }

  
  @media (max-width: 768px) {
    .navbar-container {
      width: 95%;
      padding: 0.6rem 1rem;
    }

    
    .nav-left, .nav-right {
      display: none;
    }

    
    .mobile-menu-toggle {
      display: block;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-primary);
      position: absolute;
      left: 1rem;
      top: 0.6rem;
      z-index: 10;
    }

    
    .logo-center {
      margin: 0 auto;
    }

    .logo-img {
      height: 35px;
    }

    
    .mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--navbar-bg);
      backdrop-filter: blur(12px);
      border-radius: 1rem;
      margin-top: 0.5rem;
      padding: 1rem;
      flex-direction: column;
      gap: 0.8rem;
      align-items: center;
      z-index: 1000;
      border: 1px solid var(--navbar-border);
      box-shadow: 0 0 10px var(--neon-color);
    }

    .mobile-menu.show {
      display: flex;
    }

    .mobile-menu a {
      width: 100%;
      text-align: center;
      padding: 0.5rem;
      font-size: 1rem;
    }

    .mobile-cart {
      width: 100%;
      text-align: center;
    }

    .mobile-cart .cart-icon {
      display: inline-flex;
      justify-content: center;
      gap: 0.5rem;
    }

    .mobile-dark-toggle {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-primary);
      padding: 0.5rem;
    }

    .mobile-menu .cart-badge {
      position: relative;
      top: -2px;
      right: 0;
      margin-left: 0.3rem;
    }
    .logo-center {
      margin: 0 auto;
    }
  }

.mobile-menu {
    opacity: 0;
    visibility: hidden;
    transform: translateY(-20px) scale(0.95);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0s linear 0.3s;
}


.mobile-menu.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0s linear 0s;
}
</style>

<div class="navbar">
  <div class="navbar-container">
    <div class="navbar-links">
      
      <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="القائمة">☰</button>

      
      <div class="nav-left">
        <a href="index.html" data-i18n="nav_home">Home</a>
        <a href="about.html" data-i18n="nav_about">About</a>
      </div>

      
      <div class="logo-center">
        <img src="images/logo.jpg" alt="Logo" class="logo-img">
      </div>

      
      <div class="nav-right">
        <a href="products.html" data-i18n="nav_products">Products</a>
        <a href="contact.html" data-i18n="nav_contact">Contact</a>
        <div class="cart-wrapper">
          <a href="cart.html" class="cart-icon">
            🛒
            <span id="cart-count" class="cart-badge">0</span>
          </a>
        </div>
        <button id="lang-toggle">العربية</button>
        <a href="login.html" id="nav-login" data-i18n="nav_login">Login</a>
        <a href="admin.html" id="nav-admin" style="display:none;" data-i18n="nav_admin">Admin</a>
        <button id="nav-logout" style="display:none;" class="btn-primary">Logout</button>
        <button id="dark-mode-toggle">🌙</button>
      </div>

      
      <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" data-i18n="nav_home">Home</a>
        <a href="about.html" data-i18n="nav_about">About</a>
        <a href="products.html" data-i18n="nav_products">Products</a>
        <a href="contact.html" data-i18n="nav_contact">Contact</a>
        <div class="cart-wrapper mobile-cart">
          <a href="cart.html" class="cart-icon">
            🛒
            <span id="cart-count-mobile" class="cart-badge">0</span>
          </a>
        </div>
        <button id="lang-toggle-mobile" class="mobile-dark-toggle">العربية</button>
        <a href="login.html" id="nav-login-mobile" data-i18n="nav_login">Login</a>
        <a href="admin.html" id="nav-admin-mobile" style="display:none;" data-i18n="nav_admin">Admin</a>
        <button id="nav-logout-mobile" style="display:none;" class="mobile-dark-toggle">Logout</button>
        <button id="dark-mode-toggle-mobile" class="mobile-dark-toggle">🌙</button>
      </div>
    </div>
  </div>
</div>
