<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BUTCHER SHOP</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-card { max-width: 480px; margin: 4rem auto; background: var(--card-bg); padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .auth-card h1 { margin-bottom: 1rem; }
        .auth-card p { margin-bottom: 1.5rem; color: var(--text-secondary); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input { width: 100%; padding: 0.75rem 0.8rem; border: 1px solid var(--border-color); border-radius: 0.7rem; background: var(--bg-primary); color: var(--text-primary); }
        .auth-btn { width: 100%; display: inline-flex; justify-content: center; padding: 0.9rem 1.2rem; border-radius: 0.75rem; border: none; background: var(--btn-primary); color: white; cursor: pointer; font-weight: 600; }
        .auth-note { font-size: 0.95rem; color: var(--text-secondary); margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="container">
            <div class="auth-card" data-aos="fade-up">
                <h1 class="section-title" data-i18n="login_title">Login</h1>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email" data-i18n="login_email">Email</label>
                        <input id="login-email" type="email" required data-i18n-placeholder="login_email_placeholder" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="login-password" data-i18n="login_password">Password</label>
                        <input id="login-password" type="password" required data-i18n-placeholder="login_password_placeholder" placeholder="Enter your password">
                    </div>
                    <button type="submit" class="auth-btn" data-i18n="login_button">Sign In</button>
                </form>
                <div id="login-message" class="auth-note"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><span>© 2025 BUTCHER SHOP. All rights reserved.</span></div>
    </footer>

    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const message = document.getElementById('login-message');
            const user = getCurrentUser();
            if (user && user.email) {
                message.textContent = `${t('login_success')} ${user.email}`;
            }

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const emailInput = document.getElementById('login-email');
                const passwordInput = document.getElementById('login-password');
                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value.trim();
                if (!email || !password) {
                    alert(t('contact_error'));
                    return;
                }
                if (isAdminEmail(email)) {
                    if (password !== ADMIN_PASSWORD) {
                        alert(t('login_invalid_admin'));
                        return;
                    }
                    const user = { email, role: 'admin' };
                    saveUser(user);
                    alert(t('login_success'));
                    window.location.href = 'admin.html';
                    return;
                }
                const user = { email, role: 'customer' };
                saveUser(user);
                alert(t('login_success'));
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
